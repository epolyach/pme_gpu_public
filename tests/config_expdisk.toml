# Low-resolution config for ExpDisk model

[core]
m = 2
kres = 7

[grid]
NR = 21
Nv = 11
NW = 101
NW_orbit = 10001
radial_grid_type = 0
alpha = 3.0
circulation_grid_type = 3

[phase_space]
optimization_on = false
full_space = false
sharp_df = false
Omega_2_lim = 1
delta_F0 = 1e-3

[physics]
m = 2
beta = 0.0001
selfgravity = 1.0

[tolerances]
instability_threshold = 1e-10
orbital_tolerance = 1e-8

[io]
save_eigenvectors = false
save_debug = false
verbose = true
max_display_modes = 5

[gpu]
precision_double = false

[cpu]
precision_double = false
max_threads = 4
