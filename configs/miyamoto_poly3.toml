# Configuration for Miyamoto model with Poly Taper test run
# Circulation grid to handle both prograde and retrograde motion smoothly

[core]
model_file = "models/miyamotoTaperPoly3.toml"
kres = 21                   # Number of resonance points

[grid]
NR = 51                     # Number of radial (guiding center) points
Nv = 41                     # Number of circulation points
Nvt = 21
NW = 201                     # Minimal orbital phase grid 
NW_orbit = 40001            # Minimal orbit integration grid 

# Radial grid parameters
radial_grid_type = 3
R_min = 0.01  
R_max = 5.0

# Circulation grid
circulation_grid_type = 7   # 6-Trapezoid grid for poly3 model
# alpha_v = 2.0

[phase_space]
optimization_on = false    # Enable grid optimization
full_space = true          # Use full phase space
sharp_df = false           # No sharp DF extension needed with poly3 taper
Omega_2_lim = 0            # Omega_2 at L=0

[physics]
m = 2                       # Azimuthal mode number (bar mode)
beta = 0.0001               # Gravity softening
selfgravity = 1.0           # Self-gravity scaling

[tolerances]
instability_threshold = 1e-3
orbital_tolerance = 1e-8

[io]
data_path = "data_miyamoto_poly3"
save_eigenvectors = true
save_debug = true
max_display_modes = 12

[gpu]
precision_double = false     # Use Float32 for speed

[cpu]
max_threads = 32
precision_double = false     # Use Float32 for speed
