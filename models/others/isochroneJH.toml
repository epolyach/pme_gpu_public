# Isochrone Model with JH Taper (Jalali & Hunter 2005)

[metadata]
name = "Isochrone Model - JH Taper"
description = "Kalnajs isochrone model with Jalali-Hunter (2005) central taper for negative angular momentum"
model_type = "IsochroneTaperJH"
reference = "Kalnajs (1976) ApJ 205, 751; Jalali & Hunter (2005) ApJ 630, 804"
version = "1.0"

[model]
type = "IsochroneTaperJH"
# Isochrone Model Parameters
mk = 12                 # Polynomial degree (higher mk = more centrally concentrated)

# JH Taper Parameters (automatically applied for h <= 0)
# No additional parameters needed - taper is intrinsic to JH formulation

[physics]
m = 2                      # Azimuthal mode number (3 = spiral mode)
beta = 0.0001              # Gravity softening parameter
selfgravity = 1.0          # Self-gravity scaling factor (0.0 to 1.0)

