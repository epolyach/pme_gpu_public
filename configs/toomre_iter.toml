# Configuration for Toomre model with iterative eigensolver
# Uses shift-invert method to find unstable modes

[core]
kres = 21                    # Number of resonance points

[grid]
NR = 101                    # Number of radial (guiding center) points
Nv = 41                     # Number of velocity/eccentricity points (unidirectional)
NW = 501                    # Minimal orbital phase grid 
NW_orbit = 100001           # Minimal orbit integration grid 

# Radial grid parameters
radial_grid_type = 3        # Type 3/4: Trapezoid/Simpson rule
R_min = 0.03
R_max = 30.0

# Circulation/velocity grid
circulation_grid_type = 2   # Type 2/3: Trapezoid/Simpson rule

[phase_space]
optimization_on = false     # Enable grid optimization
full_space = false          # Use UNIDIRECTIONAL space (v >= 0, L >= 0)
sharp_df = false            # Enable sharp DF extension at L=0

[physics]
m = 2                       # Azimuthal mode number (bar mode)
beta = 0.00001              # Gravity softening
selfgravity = 1.0           # Self-gravity scaling

[elliptic]
NZ = 20001
z_precision = 1e-6
psi_integration_points = 20001

[tolerances]
instability_threshold = 1e-3
orbital_tolerance = 1e-8

[io]
data_path = "data_toomre"
save_eigenvectors = true
save_debug = true

[gpu]
precision_double = false    # Use Float32 to save memory

[eigenvectors]
iterative = true
# Number of eigenvalues = length of these arrays
# Expected Ωₚ values (code multiplies by m=2)
shift_Omega_p = [0.4397, 0.3916, 0.3607, 0.3309, 0.4284, 0.3035, 0.2786, 0.2558, 0.2348, 0.2154]
# Expected γ values (growth rates)
shift_gamma = [0.1256, 0.0516, 0.0483, 0.0441, 0.0420, 0.0412, 0.0384, 0.0355, 0.0327, 0.0300]

[cpu]
max_threads = 4
