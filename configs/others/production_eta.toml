# Small Test Configuration
# Fast test for development and debugging

[metadata]
name = "Eta sweep Configuration"
description = "High-resolution settings"
target_system = "GPU++"
runtime = "4-13 hours"

[core]
kres = 15           # Minimal resonance terms for ultra-fast testing
k0   = -7

[grid]
NR = 51            # Minimal radial grid (was 21)
Nv = 21            # Minimal circulation grid (was 7)
NW = 201            # Minimal orbital phase grid (was 51)
NW_orbit = 10001    # Minimal orbit integration grid (was 3001)

# Radial-circulation grid
radial_grid_type = 0        # Exponential grid
alpha = 3.0                 # Scaling parameter for exponential grid
circulation_grid_type = 5   # Tanh-mapped circulation grid (full h-domain)
alpha_v = 3.0               # Power/stretch exponent (type 4)
v_jump_scale = 0.05                   # Tanh concentration parameter (type 5)

[phase_space]
optimization_on = true   # For a custom boundary v_min->1 (governed by delta_F0) 
full_space = true        # Include retrograde (negative Lz), otherwise only prograde stars are present
delta_F0 = 1e-3          # Circulation grid parameter

[eigenvectors]
compute = false
num_output = 6

[io]
data_path = "data_production_eta"
overwrite_data = true     # Always overwrite test data
verbose = true
debug = true              # Output Pi elements and additional debug data
single_precision = false  # Write binary files in single precision (default: false for double)
binary_output = true      # Enable binary file output

[elliptic]
# Elliptic function parameters for fast testing


[comments]
description = "eta-sweep"

[thermal]
max_threads = 4
