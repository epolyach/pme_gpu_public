# Configuration for Miyamoto model with Tanh Taper test run
# Circulation grid to handle both prograde and retrograde motion smoothly

[core]
model_file = "models/miyamotoTaperTanh.toml"
kres = 15                   # Number of resonance points

[grid]
NR = 61                     # Number of radial (guiding center) points
Nv = 47                     # Number of circulation points
Nvt = 17
NW = 201                     # Minimal orbital phase grid 
NW_orbit = 10001            # Minimal orbit integration grid 

# Radial grid parameters
radial_grid_type = 3
R_min = 0.031  
R_max = 10.0

# Circulation grid
circulation_grid_type = 8
# alpha_v = 2.0

[phase_space]
optimization_on = false     # Enable grid optimization
full_space = true          # Use full phase space
sharp_df = false           # No sharp DF extension needed with tanh taper
Omega_2_lim = 0            # Omega_2 at L=0

[physics]
m = 2                       # Azimuthal mode number (bar mode)
beta = 0.0001               # Gravity softening
selfgravity = 1.0           # Self-gravity scaling

[tolerances]
instability_threshold = 1e-3
orbital_tolerance = 1e-8

[io]
data_path = "data_miyamoto_tanh"
save_eigenvectors = true
save_debug = true

[cpu]
precision_double = true  # Use Float64 for Pi-elements and K-matrix
max_threads = 4
